<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/gumtree-campaign.css" />
    <title>Map your home office setup | SYSTEM 8</title>
  </head>
  <body data-sheet="home">
    <main class="shell">
      <header class="brand-row">
        <div>
          <div class="brand" data-brand>SYSTEM 8</div>
          <div class="promise" data-promise>Practical AI, automation and home-office systems</div>
        </div>
        <div class="short" data-short-url></div>
      </header>

      <section class="hero">
        <div>
          <h1 data-title></h1>
          <p class="kicker" data-kicker></p>
          <p class="breadcrumb" data-breadcrumb></p>
        </div>
        <aside class="panel">
          <h2>Choose the closest reason you scanned</h2>
          <p data-picture></p>
          <p data-value-add></p>
          <div class="cta-row">
            <a class="cta" href="/g/audit?from=home&c=gt-home-a" data-cta-link><span data-cta></span></a>
          </div>
        </aside>
      </section>

      <section class="intent-grid" data-intents></section>

      <section class="value">
        <div class="panel">
          <h2>What you already have</h2>
          <ul data-already-have></ul>
        </div>
        <div class="panel">
          <h2>What the free audit adds</h2>
          <ul data-tailored-adds></ul>
        </div>
      </section>
    </main>
    <script type="module" src="/gumtree-campaign.js"></script>
  </body>
</html>
